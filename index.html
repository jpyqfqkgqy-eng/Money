  醫院:"#A8E6CF", 政治:"#b09ae0", 感情:"#e07070", 觀察:"#7EB8F7",
  文學:"#d4a830", 名著:"#e09060", 人類:"#4ab8b0", 夜店:"#e8c84a",
  哲學:"#9ab0c8", 冷笑話:"#c8d4e0", 職場:"#80c8b0",
};

// Canvas shimmer
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 320, H = 420;
let t = 0;
function drawShimmer() {
  ctx.clearRect(0, 0, W, H);
  for (let y = 0; y < H; y += 5) {
    const wave = Math.sin(y*0.016+t*0.5)*2.5 + Math.sin(y*0.031+t*0.35+1.1)*1.5 + Math.sin(y*0.008+t*0.8+2.4)*1;
    const a = 0.01 + Math.abs(Math.sin(y*0.018+t*0.25))*0.009;
    ctx.strokeStyle = `rgba(180,200,230,${a})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(wave, y); ctx.lineTo(wave+W, y); ctx.stroke();
  }
  for (let x = 0; x < W; x += 38) {
    const sh = Math.sin(x*0.04+t*0.45)*5;
    const a = 0.004 + Math.abs(Math.sin(x*0.07+t*0.3))*0.007;
    ctx.strokeStyle = `rgba(200,215,240,${a})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x+sh, 0); ctx.lineTo(x+sh*0.4, H); ctx.stroke();
  }
  t += 0.014;
  requestAnimationFrame(drawShimmer);
}
drawShimmer();

// State
let phase = 'idle';

const mirror        = document.getElementById('mirror');
const rippleWrap    = document.getElementById('ripple-wrap');
const idleContent   = document.getElementById('idle-content');
const rippleContent = document.getElementById('ripple-content');
const revealContent = document.getElementById('reveal-content');
const tagLabel      = document.getElementById('tag-label');
const tagLineL      = document.getElementById('tag-line-l');
const tagLineR      = document.getElementById('tag-line-r');
const quoteText     = document.getElementById('quote-text');
const quoteNum      = document.getElementById('quote-num');
const btnAgain      = document.getElementById('btn-again');

const allContent = [idleContent, rippleContent, revealContent];

function showOnly(el) {
  allContent.forEach(e => e.classList.add('hidden'));
  el.classList.remove('hidden');
}

function restartAnimation(el) {
  el.style.animation = 'none';
  void el.offsetWidth; // reflow
  el.style.animation = '';
}

function spawnRipples() {
  rippleWrap.innerHTML = '';
  rippleWrap.classList.remove('hidden');
  [0, 1, 2].forEach(i => {
    const r = document.createElement('div');
    r.className = 'ripple-ring';
    r.style.animationDelay = `${i * 0.14}s`;
    rippleWrap.appendChild(r);
  });
  setTimeout(() => rippleWrap.classList.add('hidden'), 900);
}

function consult() {
  if (phase === 'ripple') return;
  const pick = quotes[Math.floor(Math.random() * quotes.length)];
  phase = 'ripple';
  mirror.classList.add('waiting');
  showOnly(rippleContent);
  spawnRipples();

  setTimeout(() => {
    const color = tagColors[pick.tag] || '#9ab0c8';
    tagLabel.textContent = pick.tag;
    tagLabel.style.color = color + 'bb';
    tagLineL.style.background = `linear-gradient(90deg, transparent, ${color}38)`;
    tagLineR.style.background = `linear-gradient(90deg, ${color}38, transparent)`;
    quoteText.textContent = pick.text;
    quoteNum.textContent = 'No.' + String(pick.id).padStart(3, '0');

    showOnly(revealContent);
    restartAnimation(revealContent);

    phase = 'reveal';
    mirror.classList.remove('waiting');
  }, 900);
}

mirror.addEventListener('click', consult);
btnAgain.addEventListener('click', e => { e.stopPropagation(); consult(); });
</script>
